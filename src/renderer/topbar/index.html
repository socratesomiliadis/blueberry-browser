<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blueberry TopBar</title>
    <script>
      (() => {
        const savedMode = localStorage.getItem("darkMode");
        let isDarkMode = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;

        if (savedMode !== null) {
          try {
            isDarkMode = JSON.parse(savedMode) === true;
          } catch {
            localStorage.removeItem("darkMode");
          }
        }

        if (isDarkMode) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        --initial-background: #f5f5f5;
      }

      :root.dark {
        color-scheme: dark;
        --initial-background: #141414;
      }

      html {
        background: var(--initial-background);
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif;
        background: var(--initial-background);
        height: 100vh;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
